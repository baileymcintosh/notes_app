<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voice Notes" />
  <link rel="manifest" href="manifest.json" />
  <title>Voice Notes</title>
  <style>
    :root {
      --accent:    #007AFF;
      --danger:    #FF3B30;
      --green:     #34C759;
      --orange:    #FF9F0A;
      --purple:    #AF52DE;
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --label:     #000000;
      --secondary: #6C6C70;
      --border:    rgba(60,60,67,0.12);
      --st: env(safe-area-inset-top,    0px);
      --sb: env(safe-area-inset-bottom, 0px);
      --sl: env(safe-area-inset-left,   0px);
      --sr: env(safe-area-inset-right,  0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #000000;
        --card:      #1C1C1E;
        --label:     #FFFFFF;
        --secondary: #8E8E93;
        --border:    rgba(84,84,88,0.6);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { touch-action: manipulation; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100dvh;
      padding-top:    max(var(--st), 16px);
      padding-bottom: max(var(--sb), 24px);
      padding-left:   calc(var(--sl) + 16px);
      padding-right:  calc(var(--sr) + 16px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; }
    #settingsBtn {
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 6px; opacity: 0.75;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Banners ── */
    #noKeyWarning {
      background: rgba(255,159,10,.12);
      border: 1px solid rgba(255,159,10,.3);
      color: var(--orange);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      margin-bottom: 20px;
      cursor: pointer;
      text-align: center;
      touch-action: manipulation;
    }
    #noKeyWarning.hidden { display: none; }
    #errorBanner {
      background: rgba(255,59,48,.1);
      border: 1px solid rgba(255,59,48,.25);
      color: var(--danger);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    #errorBanner.show { display: block; }

    /* ── Record section ── */
    #recordSection {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-bottom: 36px;
    }
    #statusText {
      font-size: 16px;
      color: var(--secondary);
      min-height: 22px;
      transition: color 0.2s;
    }
    #statusText.rec   { color: var(--danger); font-weight: 600; }
    #statusText.proc  { color: var(--accent); }

    #recordBtn {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,122,255,.35);
      transition: transform .15s, background .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #recordBtn.recording {
      background: var(--danger);
      box-shadow: 0 4px 20px rgba(255,59,48,.4);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #recordBtn:disabled { opacity: 0.45; cursor: default; animation: none; }
    #recordBtn:active:not(:disabled) { transform: scale(0.92); }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.07); }
    }

    /* ── Last recording card ── */
    #lastCard {
      width: 100%;
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-meta span:first-child { font-size: 12px; color: var(--secondary); }
    #savedBadge {
      font-size: 12px; font-weight: 600;
      color: var(--green);
      opacity: 0; transition: opacity .3s;
    }
    #savedBadge.show { opacity: 1; }
    #rawTranscript {
      font-size: 14px;
      color: var(--secondary);
      line-height: 1.4;
      font-style: italic;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    #structuredResult { display: none; }

    /* ── Structured display (shared) ── */
    .s-type-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .s-type-label.cal { color: var(--accent); }
    .s-type-label.todo { color: var(--purple); }

    .s-title   { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .s-detail  { font-size: 13px; color: var(--secondary); line-height: 1.5; }
    .s-detail span { display: block; }

    /* ── Notes section ── */
    #notesSection h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    #notesList { display: flex; flex-direction: column; gap: 8px; }

    .note-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .note-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .note-body { flex: 1; min-width: 0; }
    .note-type-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .note-type-label.cal  { color: var(--accent); }
    .note-type-label.todo { color: var(--purple); }
    .note-title { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .note-sub   { font-size: 13px; color: var(--secondary); line-height: 1.4; }
    .note-timestamp { font-size: 11px; color: var(--secondary); margin-top: 5px; }

    .note-del {
      background: none; border: none;
      color: var(--secondary);
      font-size: 20px; line-height: 1;
      cursor: pointer; padding: 0 0 0 6px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .note-del:active { color: var(--danger); }

    #emptyState {
      text-align: center;
      color: var(--secondary);
      padding: 32px 0;
    }
    #emptyState .icon { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ── Settings sheet ── */
    #overlay {
      display: none;
      pointer-events: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: flex-end;
    }
    #overlay.open { display: flex; pointer-events: auto; }
    #sheet {
      background: var(--card);
      border-radius: 18px 18px 0 0;
      padding: 20px 20px calc(max(var(--sb), 16px) + 4px);
      width: 100%; max-width: 560px; margin: 0 auto;
    }
    #sheet h2 {
      font-size: 18px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    #closeBtn {
      background: none; border: none;
      font-size: 20px; color: var(--secondary);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #sheet label { font-size: 13px; color: var(--secondary); display: block; margin-bottom: 8px; }
    #apiKeyInput {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--label);
      font-size: 14px;
      font-family: 'Menlo', 'SF Mono', monospace;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }
    #apiKeyInput:focus { outline: none; border-color: var(--accent); }
    #saveBtn {
      width: 100%;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #saveBtn:active { opacity: .85; }
  </style>
</head>
<body>

  <header>
    <h1>Voice Notes</h1>
    <button type="button" id="settingsBtn" aria-label="Settings">⚙️</button>
  </header>

  <div id="noKeyWarning">Tap here to add your OpenAI API key</div>
  <div id="errorBanner"></div>

  <div id="recordSection">
    <p id="statusText">Tap to record</p>
    <button type="button" id="recordBtn" aria-label="Start recording">🎤</button>
    <div id="lastCard">
      <div class="card-meta">
        <span>Last recording</span>
        <span id="savedBadge">✓ Saved</span>
      </div>
      <p id="rawTranscript"></p>
      <div id="structuredResult"></div>
    </div>
  </div>

  <section id="notesSection">
    <h2>Notes</h2>
    <div id="notesList"></div>
    <div id="emptyState">
      <span class="icon">🎙️</span>
      Record your first voice note
    </div>
  </section>

  <div id="overlay">
    <div id="sheet">
      <h2>Settings <button type="button" id="closeBtn" aria-label="Close">✕</button></h2>
      <label for="apiKeyInput">OpenAI API Key</label>
      <input id="apiKeyInput" type="password" placeholder="sk-proj-…"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button type="button" id="saveBtn">Save</button>
    </div>
  </div>

  <script>
    const NOTES_KEY  = 'vnotes_v2';
    const APIKEY_KEY = 'vnotes_apikey';

    const $          = id => document.getElementById(id);
    const recordBtn  = $('recordBtn');
    const statusText = $('statusText');
    const lastCard   = $('lastCard');
    const rawTranscript   = $('rawTranscript');
    const structuredResult = $('structuredResult');
    const savedBadge  = $('savedBadge');
    const notesList   = $('notesList');
    const emptyState  = $('emptyState');
    const errorBanner = $('errorBanner');
    const noKeyWarning = $('noKeyWarning');
    const overlay     = $('overlay');
    const apiKeyInput = $('apiKeyInput');

    let mediaRecorder = null;
    let audioChunks   = [];
    let recording     = false;
    let processing    = false;

    // ── Init ──────────────────────────────────────────────────
    try { updateKeyWarning(); } catch(e) { console.error(e); }
    try { renderNotes(); }      catch(e) { console.error(e); }

    // ── API key ───────────────────────────────────────────────
    const getKey = () => { try { return localStorage.getItem(APIKEY_KEY) || ''; } catch { return ''; } };
    function updateKeyWarning() {
      noKeyWarning.classList.toggle('hidden', !!getKey());
    }

    noKeyWarning.addEventListener('click', openSettings);
    $('settingsBtn').addEventListener('click', openSettings);
    $('closeBtn').addEventListener('click', closeSettings);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });
    $('saveBtn').addEventListener('click', () => {
      const k = apiKeyInput.value.trim();
      if (!k) return;
      try { localStorage.setItem(APIKEY_KEY, k); } catch {}
      updateKeyWarning();
      closeSettings();
    });
    function openSettings() {
      apiKeyInput.value = getKey();
      overlay.classList.add('open');
      setTimeout(() => apiKeyInput.focus(), 50);
    }
    function closeSettings() { overlay.classList.remove('open'); }

    // ── Recording ─────────────────────────────────────────────
    recordBtn.addEventListener('click', async () => {
      if (processing) return;
      recording ? stopRecording() : await startRecording();
    });

    async function startRecording() {
      hideError();
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        showError('Microphone access denied — please allow it in your browser settings.');
        return;
      }
      const mime = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
      mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: mime || 'audio/mp4' });
        processRecording(blob, mime);
      };
      mediaRecorder.start(100);
      recording = true;
      recordBtn.classList.add('recording');
      recordBtn.textContent = '⏹';
      setStatus('Recording…', 'rec');
    }

    function stopRecording() {
      if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
      recording = false;
      recordBtn.classList.remove('recording');
      recordBtn.textContent = '🎤';
    }

    // ── Pipeline: transcribe → classify → save ────────────────
    async function processRecording(blob, mime) {
      const apiKey = getKey();
      if (!apiKey) {
        showError('No API key set — tap ⚙️ to add it.');
        setStatus('Tap to record', '');
        return;
      }

      processing = true;
      recordBtn.disabled = true;

      let transcript = '';
      try {
        // Step 1: Whisper
        setStatus('Transcribing…', 'proc');
        const ext = mime.includes('mp4') ? 'm4a' : mime.includes('webm') ? 'webm' : 'ogg';
        const form = new FormData();
        form.append('model', 'whisper-1');
        form.append('file', blob, `audio.${ext}`);
        const r1 = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST',
          headers: { Authorization: `Bearer ${apiKey}` },
          body: form,
        });
        if (!r1.ok) throw new Error(`Whisper error ${r1.status}`);
        const t = await r1.json();
        transcript = (t.text || '').trim();
        if (!transcript) {
          showError('No speech detected — try again closer to the microphone.');
          return;
        }

        // Step 2: GPT classify
        setStatus('Classifying…', 'proc');
        const structured = await classifyNote(transcript, apiKey);

        // Step 3: Save + render
        const note = { id: Date.now(), createdAt: new Date().toISOString(), transcript, ...structured };
        addNote(note);
        renderNotes();
        showLastCard(note);
        flashSaved();

      } catch (err) {
        showError(`Error: ${err.message}`);
      } finally {
        processing = false;
        recordBtn.disabled = false;
        setStatus('Tap to record', '');
      }
    }

    async function classifyNote(transcript, apiKey) {
      const now  = new Date();
      const day  = now.toLocaleDateString('en-US', { weekday: 'long' });
      const date = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      const system = `You are a productivity assistant. Today is ${day}, ${date}.
Classify the voice note as "calendar" (event with a specific date/time) or "todo" (task with no fixed time).
Rules: if a specific date or time is mentioned → calendar. Otherwise → todo. If ambiguous → todo.
Return ONLY valid JSON, no extra text:
{"type":"calendar"|"todo","calendar":{"title":"short title","date":"YYYY-MM-DD or null","time":"HH:MM 24h or null","description":"details or null","location":"location or null"},"todo":{"task":"clear actionable task"}}`;

      const r = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0,
          response_format: { type: 'json_object' },
          messages: [
            { role: 'system', content: system },
            { role: 'user',   content: transcript },
          ],
        }),
      });

      if (!r.ok) throw new Error(`GPT error ${r.status}`);
      const d = await r.json();
      return JSON.parse(d.choices[0].message.content);
    }

    // ── UI ────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusText.textContent = msg;
      statusText.className = cls;
    }

    function showLastCard(note) {
      rawTranscript.textContent = `"${note.transcript}"`;
      structuredResult.innerHTML = buildStructuredHTML(note);
      structuredResult.style.display = 'block';
      lastCard.style.display = 'block';
    }

    function buildStructuredHTML(note) {
      if (note.type === 'calendar') {
        const c = note.calendar || {};
        const dateStr = c.date ? fmtDate(c.date) : '';
        const timeStr = c.time ? fmtTime(c.time) : '';
        const when = [dateStr, timeStr].filter(Boolean).join(' · ');
        return `
          <div class="s-type-label cal">📅 Calendar event</div>
          <div class="s-title">${esc(c.title || 'Untitled event')}</div>
          <div class="s-detail">
            ${when ? `<span>${when}</span>` : ''}
            ${c.location ? `<span>📍 ${esc(c.location)}</span>` : ''}
            ${c.description && c.description !== c.title ? `<span>${esc(c.description)}</span>` : ''}
          </div>`;
      } else {
        const task = note.todo?.task || note.transcript;
        return `
          <div class="s-type-label todo">☐ To-do</div>
          <div class="s-title">${esc(task)}</div>`;
      }
    }

    function flashSaved() {
      savedBadge.classList.add('show');
      setTimeout(() => savedBadge.classList.remove('show'), 2500);
    }
    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add('show');
      setTimeout(() => errorBanner.classList.remove('show'), 7000);
    }
    function hideError() { errorBanner.classList.remove('show'); }

    // ── Notes storage ─────────────────────────────────────────
    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch { return []; }
    }
    function addNote(note) {
      const notes = loadNotes();
      notes.unshift(note);
      try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch {}
    }
    function deleteNote(id) {
      const notes = loadNotes().filter(n => n.id !== id);
      try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch {}
      renderNotes();
    }

    function renderNotes() {
      const notes = loadNotes();
      emptyState.style.display = notes.length ? 'none' : 'block';
      notesList.innerHTML = '';
      for (const n of notes) {
        const div = document.createElement('div');
        div.className = 'note-card';
        div.innerHTML = buildNoteCardHTML(n);
        div.querySelector('.note-del').addEventListener('click', () => deleteNote(n.id));
        notesList.appendChild(div);
      }
    }

    function buildNoteCardHTML(n) {
      const ts = `<div class="note-timestamp">${fmtTimestamp(n.createdAt || n.date)}</div>`;
      if (n.type === 'calendar') {
        const c = n.calendar || {};
        const dateStr = c.date ? fmtDate(c.date) : '';
        const timeStr = c.time ? fmtTime(c.time) : '';
        const when = [dateStr, timeStr].filter(Boolean).join(' · ');
        return `
          <div class="note-icon">📅</div>
          <div class="note-body">
            <div class="note-type-label cal">Calendar</div>
            <div class="note-title">${esc(c.title || 'Untitled')}</div>
            <div class="note-sub">
              ${when ? when + '<br>' : ''}
              ${c.location ? '📍 ' + esc(c.location) : ''}
            </div>
            ${ts}
          </div>
          <button type="button" class="note-del" aria-label="Delete">×</button>`;
      } else if (n.type === 'todo') {
        const task = n.todo?.task || n.transcript;
        return `
          <div class="note-icon">☐</div>
          <div class="note-body">
            <div class="note-type-label todo">To-do</div>
            <div class="note-title">${esc(task)}</div>
            ${ts}
          </div>
          <button type="button" class="note-del" aria-label="Delete">×</button>`;
      } else {
        // legacy plain-text note
        return `
          <div class="note-icon">🎙️</div>
          <div class="note-body">
            <div class="note-title">${esc(n.text || n.transcript || '')}</div>
            ${ts}
          </div>
          <button type="button" class="note-del" aria-label="Delete">×</button>`;
      }
    }

    // ── Date/time helpers ─────────────────────────────────────
    function fmtDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function fmtTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':').map(Number);
      const period = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${h12}:${String(m).padStart(2,'0')} ${period}`;
    }
    function fmtTimestamp(iso) {
      if (!iso) return '';
      const d = new Date(iso), now = new Date();
      const t = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (d.toDateString() === now.toDateString()) return `Today, ${t}`;
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + `, ${t}`;
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
