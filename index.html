<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voice Notes" />
  <link rel="manifest" href="manifest.json" />
  <title>Voice Notes</title>
  <style>
    :root {
      --accent:    #007AFF;
      --danger:    #FF3B30;
      --green:     #34C759;
      --orange:    #FF9F0A;
      --purple:    #AF52DE;
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --label:     #000000;
      --secondary: #6C6C70;
      --border:    rgba(60,60,67,0.12);
      --st: env(safe-area-inset-top,    0px);
      --sb: env(safe-area-inset-bottom, 0px);
      --sl: env(safe-area-inset-left,   0px);
      --sr: env(safe-area-inset-right,  0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #000000;
        --card:      #1C1C1E;
        --label:     #FFFFFF;
        --secondary: #8E8E93;
        --border:    rgba(84,84,88,0.6);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { touch-action: manipulation; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100dvh;
      padding-top:    max(var(--st), 16px);
      padding-bottom: max(var(--sb), 24px);
      padding-left:   calc(var(--sl) + 16px);
      padding-right:  calc(var(--sr) + 16px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; }
    #headerRight { display: flex; align-items: center; gap: 10px; }
    #connPill {
      display: none; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500;
      color: var(--green);
      background: rgba(52,199,89,.12);
      border-radius: 20px; padding: 4px 9px;
    }
    #connPill.show { display: flex; }
    #connPill::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--green); flex-shrink: 0;
    }
    #settingsBtn {
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 4px; opacity: 0.7;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Setup banner ── */
    #setupBanner {
      background: var(--card); border-radius: 12px;
      padding: 16px; margin-bottom: 20px; display: none;
    }
    #setupBanner.show { display: block; }
    #setupBanner h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .setup-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .setup-row:last-child { border-bottom: none; }
    .setup-check { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
    .setup-label { flex: 1; color: var(--secondary); }
    .setup-label.done { color: var(--label); }
    .setup-action {
      font-size: 13px; font-weight: 600; color: var(--accent);
      cursor: pointer; background: none; border: none; padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Error banner ── */
    #errorBanner {
      background: rgba(255,59,48,.1); border: 1px solid rgba(255,59,48,.25);
      color: var(--danger); border-radius: 10px;
      padding: 11px 14px; font-size: 14px; margin-bottom: 20px; display: none;
    }
    #errorBanner.show { display: block; }

    /* ── Record section ── */
    #recordSection {
      display: flex; flex-direction: column;
      align-items: center; gap: 22px; margin-bottom: 36px;
    }
    #statusText { font-size: 16px; color: var(--secondary); min-height: 22px; }
    #statusText.rec  { color: var(--danger); font-weight: 600; }
    #statusText.proc { color: var(--accent); }

    #recordBtn {
      width: 96px; height: 96px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,122,255,.35);
      transition: transform .15s, background .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #recordBtn.recording {
      background: var(--danger); box-shadow: 0 4px 20px rgba(255,59,48,.4);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #recordBtn:disabled { opacity: 0.45; cursor: default; animation: none; }
    #recordBtn:active:not(:disabled) { transform: scale(0.92); }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

    /* ── Last recording card ── */
    #lastCard {
      width: 100%; background: var(--card);
      border-radius: 12px; padding: 14px 16px; display: none;
    }
    .card-meta {
      display: flex; justify-content: space-between;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .card-meta span:first-child { font-size: 12px; color: var(--secondary); flex-shrink: 0; }
    .card-badges { display: flex; gap: 6px; align-items: center; }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
      opacity: 0; transition: opacity .3s;
    }
    .badge.show   { opacity: 1; }
    .badge.saved  { background: rgba(52,199,89,.15);  color: var(--green); }
    .badge.google { background: rgba(0,122,255,.12);  color: var(--accent); }
    .badge.err    { background: rgba(255,59,48,.12);  color: var(--danger); }

    #rawTranscript {
      font-size: 14px; color: var(--secondary); line-height: 1.4; font-style: italic;
      margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    #structuredResult { display: none; }
    .s-type-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px;
    }
    .s-type-label.cal  { color: var(--accent); }
    .s-type-label.todo { color: var(--purple); }
    .s-title  { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .s-detail { font-size: 13px; color: var(--secondary); line-height: 1.5; }
    .s-detail span { display: block; }

    /* ── Notes list ── */
    #notesSection h2 {
      font-size: 12px; font-weight: 600; color: var(--secondary);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 10px; padding-left: 4px;
    }
    #notesList { display: flex; flex-direction: column; gap: 8px; }
    .note-card {
      background: var(--card); border-radius: 12px;
      padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px;
    }
    .note-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .note-body { flex: 1; min-width: 0; }
    .note-type-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px;
    }
    .note-type-label.cal  { color: var(--accent); }
    .note-type-label.todo { color: var(--purple); }
    .note-title { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .note-sub   { font-size: 13px; color: var(--secondary); line-height: 1.4; }
    .note-timestamp { font-size: 11px; color: var(--secondary); margin-top: 5px; }
    .note-del {
      background: none; border: none; color: var(--secondary);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 0 0 0 6px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .note-del:active { color: var(--danger); }
    #emptyState { text-align: center; color: var(--secondary); padding: 32px 0; }
    #emptyState .icon { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ── Settings sheet ── */
    #overlay {
      display: none; pointer-events: none;
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 200; align-items: flex-end;
    }
    #overlay.open { display: flex; pointer-events: auto; }
    #sheet {
      background: var(--card); border-radius: 18px 18px 0 0;
      padding: 20px 20px calc(max(var(--sb), 16px) + 4px);
      width: 100%; max-width: 560px; margin: 0 auto;
    }
    #sheet h2 {
      font-size: 18px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    #closeBtn {
      background: none; border: none; font-size: 20px;
      color: var(--secondary); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .setting-label { font-size: 13px; color: var(--secondary); display: block; margin-bottom: 8px; }
    .key-row { display: flex; gap: 8px; margin-bottom: 6px; }
    #apiKeyInput {
      flex: 1; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg); color: var(--label);
      font-size: 14px; font-family: 'Menlo','SF Mono',monospace; -webkit-appearance: none;
    }
    #apiKeyInput:focus { outline: none; border-color: var(--accent); }
    #apiKeyInput.saved { border-color: var(--green); }
    .setting-btn {
      border: none; border-radius: 10px;
      padding: 12px 16px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #saveKeyBtn { background: var(--accent); color: #fff; }
    #saveKeyBtn.saved { background: var(--green); }
    .setting-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    #googleBtn {
      width: 100%; border: none; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; background: var(--accent); color: #fff;
      transition: background .2s; margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    #googleBtn.connected { background: rgba(52,199,89,.15); color: var(--green); }
    #googleStatus { font-size: 13px; color: var(--secondary); min-height: 18px; }
    #googleStatus.ok   { color: var(--green); }
    #googleStatus.warn { color: var(--orange); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(max(var(--sb), 20px) + 16px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.82); color: #fff;
      font-size: 14px; font-weight: 500;
      padding: 10px 18px; border-radius: 20px;
      white-space: nowrap; opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 300; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <h1>Voice Notes</h1>
    <div id="headerRight">
      <div id="connPill">Google</div>
      <button type="button" id="settingsBtn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <div id="setupBanner">
    <h3>Quick setup</h3>
    <div class="setup-row">
      <span class="setup-check" id="keyCheck">○</span>
      <span class="setup-label" id="keyLabel">Add your OpenAI API key</span>
      <button type="button" class="setup-action" id="setupKeyBtn">Add</button>
    </div>
    <div class="setup-row">
      <span class="setup-check" id="gCheck">○</span>
      <span class="setup-label" id="gLabel">Connect Google Calendar &amp; Tasks</span>
      <button type="button" class="setup-action" id="setupGoogleBtn">Connect</button>
    </div>
  </div>

  <div id="errorBanner"></div>

  <div id="recordSection">
    <p id="statusText">Tap to record</p>
    <button type="button" id="recordBtn" aria-label="Start recording">🎤</button>
    <div id="lastCard">
      <div class="card-meta">
        <span>Last recording</span>
        <div class="card-badges">
          <span class="badge saved"  id="savedBadge">✓ Saved</span>
          <span class="badge google" id="googleBadge"></span>
        </div>
      </div>
      <p id="rawTranscript"></p>
      <div id="structuredResult"></div>
    </div>
  </div>

  <section id="notesSection">
    <h2>Notes</h2>
    <div id="notesList"></div>
    <div id="emptyState">
      <span class="icon">🎙️</span>
      Record your first voice note
    </div>
  </section>

  <div id="overlay">
    <div id="sheet">
      <h2>Settings <button type="button" id="closeBtn" aria-label="Close">✕</button></h2>

      <label class="setting-label" for="apiKeyInput">OpenAI API Key</label>
      <div class="key-row">
        <input id="apiKeyInput" type="password" placeholder="sk-proj-…"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button type="button" id="saveKeyBtn" class="setting-btn">Save</button>
      </div>
      <p id="keyStatus" style="font-size:13px;color:var(--secondary);min-height:18px;margin-bottom:4px;"></p>

      <hr class="setting-divider" />

      <label class="setting-label">Google Calendar &amp; Tasks</label>
      <button type="button" id="googleBtn">Connect Google</button>
      <p id="googleStatus"></p>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const CLIENT_ID  = '860829037272-7v04peuuldifutj46eo2jlvfoo7nc70g.apps.googleusercontent.com';
    const GSCOPES    = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks';
    const NOTES_KEY  = 'vnotes_v2';
    const APIKEY_KEY = 'vnotes_apikey';
    const GCONN_KEY  = 'vnotes_gconnected';

    const $             = id => document.getElementById(id);
    const recordBtn     = $('recordBtn');
    const statusText    = $('statusText');
    const lastCard      = $('lastCard');
    const rawTranscript = $('rawTranscript');
    const structResult  = $('structuredResult');
    const savedBadge    = $('savedBadge');
    const googleBadge   = $('googleBadge');
    const notesList     = $('notesList');
    const emptyState    = $('emptyState');
    const errorBanner   = $('errorBanner');
    const overlay       = $('overlay');
    const apiKeyInput   = $('apiKeyInput');
    const googleBtn     = $('googleBtn');
    const googleStatus  = $('googleStatus');
    const connPill      = $('connPill');
    const setupBanner   = $('setupBanner');

    let mediaRecorder = null;
    let audioChunks   = [];
    let recording     = false;
    let processing    = false;

    let gToken  = null;
    let gExpiry = 0;

    // ── Storage ───────────────────────────────────────────────
    const store = {
      get:    k => { try { return localStorage.getItem(k); }    catch { return null; } },
      set:    (k,v) => { try { localStorage.setItem(k, v); }    catch {} },
      remove: k => { try { localStorage.removeItem(k); }        catch {} },
    };
    const getKey      = () => store.get(APIKEY_KEY) || '';
    const isGoogleReady = () => !!gToken && Date.now() < gExpiry;

    // ── Init ──────────────────────────────────────────────────
    (async () => {
      // Handle OAuth callback (?code= in URL after Google redirects back)
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      if (code) {
        window.history.replaceState({}, '', window.location.pathname);
        await handleAuthCallback(code);
      } else if (store.get(GCONN_KEY)) {
        // Previously connected — silently refresh token in background
        silentRefresh();
      }

      try { updateSetupBanner(); } catch(e) {}
      try { renderNotes(); }       catch(e) {}
    })();

    // ── OAuth ─────────────────────────────────────────────────
    function connectGoogle() {
      const redirectUri = window.location.origin + '/';
      const url = new URL('https://accounts.google.com/o/oauth2/v2/auth');
      url.searchParams.set('client_id',     CLIENT_ID);
      url.searchParams.set('redirect_uri',  redirectUri);
      url.searchParams.set('response_type', 'code');
      url.searchParams.set('scope',         GSCOPES);
      url.searchParams.set('access_type',   'offline');
      url.searchParams.set('prompt',        'consent'); // ensures refresh token is issued
      window.location.href = url.toString();
    }

    async function handleAuthCallback(code) {
      const redirectUri = window.location.origin + '/';
      try {
        const resp = await fetch('/api/auth-exchange', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ code, redirect_uri: redirectUri }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Exchange failed');

        gToken  = data.access_token;
        gExpiry = Date.now() + (data.expires_in - 60) * 1000;
        store.set(GCONN_KEY, '1');
        updateGoogleUI();
        updateSetupBanner();
        showToast('Google connected ✓');
      } catch (e) {
        showError('Google sign-in failed: ' + e.message);
      }
    }

    async function silentRefresh() {
      try {
        const resp = await fetch('/api/auth-refresh', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          // Refresh token gone — user needs to reconnect
          store.remove(GCONN_KEY);
          updateGoogleUI();
          return;
        }
        gToken  = data.access_token;
        gExpiry = Date.now() + (data.expires_in - 60) * 1000;
        updateGoogleUI();
      } catch (e) {
        console.error('Silent refresh error:', e);
      }
    }

    async function ensureGoogleToken() {
      if (isGoogleReady()) return true;
      if (!store.get(GCONN_KEY)) return false;
      await silentRefresh();
      return isGoogleReady();
    }

    async function disconnectGoogle() {
      try { await fetch('/api/auth-revoke', { method: 'POST' }); } catch {}
      gToken = null; gExpiry = 0;
      store.remove(GCONN_KEY);
      updateGoogleUI();
      updateSetupBanner();
      showToast('Google disconnected');
    }

    function updateGoogleUI() {
      const ok          = isGoogleReady();
      const wasConnected = !!store.get(GCONN_KEY);
      googleBtn.textContent = ok ? 'Disconnect Google' : wasConnected ? 'Reconnect Google' : 'Connect Google';
      googleBtn.classList.toggle('connected', ok);
      googleStatus.textContent = ok ? '✓ Google Calendar & Tasks connected'
        : wasConnected ? 'Reconnecting…' : '';
      googleStatus.className = ok ? 'ok' : wasConnected ? 'warn' : '';
      connPill.classList.toggle('show', ok);
    }

    googleBtn.addEventListener('click', () => {
      isGoogleReady() ? disconnectGoogle() : connectGoogle();
    });

    // ── Settings ──────────────────────────────────────────────
    $('settingsBtn').addEventListener('click', openSettings);
    $('closeBtn').addEventListener('click', closeSettings);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

    function openSettings() {
      const key = getKey();
      apiKeyInput.value = key ? '••••••••' : '';
      apiKeyInput.classList.toggle('saved', !!key);
      $('saveKeyBtn').classList.toggle('saved', !!key);
      $('saveKeyBtn').textContent = key ? 'Update' : 'Save';
      $('keyStatus').textContent  = key ? '✓ API key saved' : '';
      $('keyStatus').style.color  = 'var(--green)';
      updateGoogleUI();
      overlay.classList.add('open');
    }
    function closeSettings() { overlay.classList.remove('open'); }

    apiKeyInput.addEventListener('focus', () => {
      if (apiKeyInput.value === '••••••••') apiKeyInput.value = '';
    });
    $('saveKeyBtn').addEventListener('click', () => {
      const k = apiKeyInput.value.trim();
      if (!k || k === '••••••••') return;
      store.set(APIKEY_KEY, k);
      apiKeyInput.value = '••••••••';
      apiKeyInput.classList.add('saved');
      $('saveKeyBtn').classList.add('saved');
      $('saveKeyBtn').textContent = 'Update';
      $('keyStatus').textContent  = '✓ API key saved';
      $('keyStatus').style.color  = 'var(--green)';
      updateSetupBanner();
      showToast('API key saved');
    });

    // ── Setup banner ──────────────────────────────────────────
    function updateSetupBanner() {
      const hasKey    = !!getKey();
      const hasGoogle = !!store.get(GCONN_KEY);
      setupBanner.classList.toggle('show', !(hasKey && hasGoogle));
      $('keyCheck').textContent  = hasKey    ? '✓' : '○';
      $('keyLabel').classList.toggle('done', hasKey);
      $('gCheck').textContent    = hasGoogle ? '✓' : '○';
      $('gLabel').classList.toggle('done', hasGoogle);
      $('setupKeyBtn').style.display    = hasKey    ? 'none' : '';
      $('setupGoogleBtn').style.display = hasGoogle ? 'none' : '';
    }
    $('setupKeyBtn').addEventListener('click', () => openSettings());
    $('setupGoogleBtn').addEventListener('click', () => connectGoogle());

    // ── Recording ─────────────────────────────────────────────
    recordBtn.addEventListener('click', async () => {
      if (processing) return;
      recording ? stopRecording() : await startRecording();
    });

    async function startRecording() {
      hideError();
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        showError('Microphone access denied — allow it in Settings → Safari.');
        return;
      }
      const mime = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
      mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        processRecording(new Blob(audioChunks, { type: mime || 'audio/mp4' }), mime);
      };
      mediaRecorder.start(100);
      recording = true;
      recordBtn.classList.add('recording');
      recordBtn.textContent = '⏹';
      setStatus('Recording…', 'rec');
    }

    function stopRecording() {
      if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
      recording = false;
      recordBtn.classList.remove('recording');
      recordBtn.textContent = '🎤';
    }

    // ── Pipeline ──────────────────────────────────────────────
    async function processRecording(blob, mime) {
      const apiKey = getKey();
      if (!apiKey) { showError('No API key — tap ⚙️ to add it.'); setStatus('Tap to record',''); return; }
      processing = true; recordBtn.disabled = true;

      try {
        setStatus('Transcribing…', 'proc');
        const ext  = mime.includes('mp4') ? 'm4a' : mime.includes('webm') ? 'webm' : 'ogg';
        const form = new FormData();
        form.append('model', 'whisper-1');
        form.append('file',  blob, `audio.${ext}`);
        const r1 = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST', headers: { Authorization: `Bearer ${apiKey}` }, body: form,
        });
        if (!r1.ok) throw new Error(`Whisper ${r1.status}`);
        const transcript = ((await r1.json()).text || '').trim();
        if (!transcript) { showError('No speech detected — try again.'); return; }

        setStatus('Classifying…', 'proc');
        const structured = await classifyNote(transcript, apiKey);
        const note = { id: Date.now(), createdAt: new Date().toISOString(), transcript, ...structured };
        addNote(note); renderNotes(); showLastCard(note); flashBadge(savedBadge);

        if (store.get(GCONN_KEY)) {
          setStatus('Saving to Google…', 'proc');
          const ready = await ensureGoogleToken();
          if (ready) {
            try {
              if (note.type === 'calendar') { await createCalendarEvent(note.calendar); googleBadge.textContent = '✓ Calendar'; }
              else { await createGoogleTask(note.todo?.task || note.transcript); googleBadge.textContent = '✓ Tasks'; }
              flashBadge(googleBadge);
            } catch (e) {
              googleBadge.textContent = 'Sync failed'; googleBadge.classList.add('err'); flashBadge(googleBadge);
            }
          }
        }

      } catch (err) {
        showError(`Error: ${err.message}`);
      } finally {
        processing = false; recordBtn.disabled = false; setStatus('Tap to record', '');
      }
    }

    // ── GPT classify ──────────────────────────────────────────
    async function classifyNote(transcript, apiKey) {
      const now    = new Date();
      const system = `You are a productivity assistant. Today is ${now.toLocaleDateString('en-US',{weekday:'long'})}, ${now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}.
Classify the voice note as "calendar" (specific date/time mentioned) or "todo" (task, no fixed time). Ambiguous → todo.
Return ONLY valid JSON:
{"type":"calendar"|"todo","calendar":{"title":"short title","date":"YYYY-MM-DD or null","time":"HH:MM 24h or null","description":"details or null","location":"location or null"},"todo":{"task":"clear actionable task"}}`;
      const r = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { Authorization: `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini', temperature: 0,
          response_format: { type: 'json_object' },
          messages: [{ role:'system', content:system },{ role:'user', content:transcript }],
        }),
      });
      if (!r.ok) throw new Error(`GPT ${r.status}`);
      return JSON.parse((await r.json()).choices[0].message.content);
    }

    // ── Google APIs ───────────────────────────────────────────
    async function createCalendarEvent(cal) {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      let start, end;
      if (cal.date && cal.time) {
        const [h,m] = cal.time.split(':').map(Number);
        const endH  = String((h+1)%24).padStart(2,'0');
        start = { dateTime:`${cal.date}T${cal.time}:00`, timeZone:tz };
        end   = { dateTime:`${cal.date}T${endH}:${String(m).padStart(2,'0')}:00`, timeZone:tz };
      } else {
        const d    = cal.date || new Date().toISOString().split('T')[0];
        const next = new Date(d+'T00:00:00'); next.setDate(next.getDate()+1);
        start = { date:d }; end = { date:next.toISOString().split('T')[0] };
      }
      const r = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method:'POST',
        headers:{ Authorization:`Bearer ${gToken}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ summary:cal.title||'Untitled event', start, end,
          ...(cal.description&&{description:cal.description}),
          ...(cal.location&&{location:cal.location}) }),
      });
      if (r.status===401){gToken=null;updateGoogleUI();}
      if (!r.ok) throw new Error(`Calendar ${r.status}`);
    }

    async function createGoogleTask(title) {
      const r = await fetch('https://tasks.googleapis.com/tasks/v1/lists/@default/tasks', {
        method:'POST',
        headers:{ Authorization:`Bearer ${gToken}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ title }),
      });
      if (r.status===401){gToken=null;updateGoogleUI();}
      if (!r.ok) throw new Error(`Tasks ${r.status}`);
    }

    // ── UI helpers ────────────────────────────────────────────
    function setStatus(msg,cls){ statusText.textContent=msg; statusText.className=cls; }
    function showLastCard(note){
      rawTranscript.textContent = `"${note.transcript}"`;
      structResult.innerHTML    = buildStructuredHTML(note);
      structResult.style.display='block';
      googleBadge.classList.remove('show','err');
      lastCard.style.display='block';
    }
    function buildStructuredHTML(note){
      if(note.type==='calendar'){
        const c=note.calendar||{};
        const when=[c.date?fmtDate(c.date):'',c.time?fmtTime(c.time):''].filter(Boolean).join(' · ');
        return `<div class="s-type-label cal">📅 Calendar event</div>
          <div class="s-title">${esc(c.title||'Untitled')}</div>
          <div class="s-detail">${when?`<span>${when}</span>`:''}${c.location?`<span>📍 ${esc(c.location)}</span>`:''}${c.description&&c.description!==c.title?`<span>${esc(c.description)}</span>`:''}</div>`;
      }
      return `<div class="s-type-label todo">☐ To-do</div>
        <div class="s-title">${esc(note.todo?.task||note.transcript)}</div>`;
    }
    function flashBadge(el){ el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500); }
    function showError(msg){ errorBanner.textContent=msg; errorBanner.classList.add('show'); setTimeout(()=>errorBanner.classList.remove('show'),7000); }
    function hideError(){ errorBanner.classList.remove('show'); }
    let toastTimer;
    function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }

    // ── Notes storage ─────────────────────────────────────────
    function loadNotes(){ try{return JSON.parse(store.get(NOTES_KEY))||[];}catch{return[];} }
    function addNote(note){ const n=loadNotes(); n.unshift(note); store.set(NOTES_KEY,JSON.stringify(n)); }
    function deleteNote(id){ store.set(NOTES_KEY,JSON.stringify(loadNotes().filter(n=>n.id!==id))); renderNotes(); }
    function renderNotes(){
      const notes=loadNotes();
      emptyState.style.display=notes.length?'none':'block';
      notesList.innerHTML='';
      for(const n of notes){
        const div=document.createElement('div'); div.className='note-card';
        div.innerHTML=buildNoteCardHTML(n);
        div.querySelector('.note-del').addEventListener('click',()=>deleteNote(n.id));
        notesList.appendChild(div);
      }
    }
    function buildNoteCardHTML(n){
      const ts=`<div class="note-timestamp">${fmtTimestamp(n.createdAt||n.date)}</div>`;
      if(n.type==='calendar'){
        const c=n.calendar||{};
        const when=[c.date?fmtDate(c.date):'',c.time?fmtTime(c.time):''].filter(Boolean).join(' · ');
        return `<div class="note-icon">📅</div><div class="note-body"><div class="note-type-label cal">Calendar</div><div class="note-title">${esc(c.title||'Untitled')}</div><div class="note-sub">${when}${c.location?(when?'<br>':'')+'📍 '+esc(c.location):''}</div>${ts}</div><button type="button" class="note-del" aria-label="Delete">×</button>`;
      }
      if(n.type==='todo'){
        return `<div class="note-icon">☐</div><div class="note-body"><div class="note-type-label todo">To-do</div><div class="note-title">${esc(n.todo?.task||n.transcript)}</div>${ts}</div><button type="button" class="note-del" aria-label="Delete">×</button>`;
      }
      return `<div class="note-icon">🎙️</div><div class="note-body"><div class="note-title">${esc(n.text||n.transcript||'')}</div>${ts}</div><button type="button" class="note-del" aria-label="Delete">×</button>`;
    }

    // ── Formatting ────────────────────────────────────────────
    function fmtDate(s){ if(!s)return''; const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
    function fmtTime(s){ if(!s)return''; const[h,m]=s.split(':').map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; }
    function fmtTimestamp(iso){ if(!iso)return''; const d=new Date(iso),now=new Date(); const t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); return d.toDateString()===now.toDateString()?`Today, ${t}`:d.toLocaleDateString([],{month:'short',day:'numeric'})+`, ${t}`; }
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
